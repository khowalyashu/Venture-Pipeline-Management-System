version: '3.9'

# ─── Quick-start commands ──────────────────────────────────────────────────────
#
#   Start only MongoDB (for local pnpm dev):
#     docker compose up -d mongo
#
#   Start MongoDB + admin UI (Mongo Express at http://localhost:8081):
#     docker compose up -d mongo mongo-express
#
#   Start everything in Docker (backend + MongoDB):
#     docker compose up
#
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: miv_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    command: --storageEngine=wiredTiger
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: payload
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (optional web admin UI) ─────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: miv_mongo_express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - admin

  # ── Backend (optional — use pnpm dev locally instead) ─────────────────────
  backend:
    image: node:20-alpine
    container_name: miv_backend
    restart: unless-stopped
    ports:
      - '3001:3000'
    working_dir: /app
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      DATABASE_URI: mongodb://mongo:27017/payload
    env_file:
      - .env
    profiles:
      - full

volumes:
  mongodb_data:
  backend_node_modules:
